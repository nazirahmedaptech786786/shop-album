<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Ahmed Paper Decoration - Secure Admin</title>

  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

  <style>
    body{
      margin:0;
      font-family:Arial;
      background:#111;
      color:white;
      text-align:center;
      padding:40px;
    }

    h1{ color:#ff9800; }

    button{
      padding:12px 25px;
      font-size:16px;
      border:none;
      border-radius:6px;
      background:#ff9800;
      font-weight:bold;
      cursor:pointer;
    }

    #adminPanel{ display:none; margin-top:30px; }
    #denied{ display:none; color:red; font-weight:bold; margin-top:20px; }
  </style>
</head>
<body>

<h1>🔐 Ahmed Paper Decoration</h1>
<p>Secure Admin Panel</p>

<div id="loginDiv">
  <button onclick="login()">Login with Google</button>
</div>

<div id="adminPanel">
  <h2>✅ Welcome Admin</h2>
  <p id="userEmail"></p>
  <button onclick="logout()">Logout</button>
</div>

<div id="denied">
  ❌ Access Denied – You are not authorized.
</div>

<script>
  const firebaseConfig = {
    apiKey: "AIzaSyAgZoSMT4LpAGUNUh3KQEVW-8ksGMTWsQs",
    authDomain: "ahmed-paper-decoration--album.firebaseapp.com",
    projectId: "ahmed-paper-decoration--album",
    storageBucket: "ahmed-paper-decoration--album.firebasestorage.app",
    messagingSenderId: "117106627667",
    appId: "1:117106627667:web:693de89f8f8456c02562a6"
  };

  firebase.initializeApp(firebaseConfig);

  const auth = firebase.auth();
  const db = firebase.firestore();

  function login(){
    const provider = new firebase.auth.GoogleAuthProvider();
    auth.signInWithPopup(provider);
  }

  function logout(){
    auth.signOut();
  }

  auth.onAuthStateChanged(async (user)=>{
    if(user){
      const snapshot = await db.collection("admins")
        .where("email","==",user.email)
        .get();

      if(!snapshot.empty){
        document.getElementById("loginDiv").style.display="none";
        document.getElementById("adminPanel").style.display="block";
        document.getElementById("denied").style.display="none";
        document.getElementById("userEmail").innerText="Logged in as: "+user.email;
} else {
    document.getElementById("loginDiv").style.display="none";
    document.getElementById("adminPanel").style.display="none";
    document.getElementById("denied").style.display="block";
}

    } else {
      document.getElementById("loginDiv").style.display="block";
      document.getElementById("adminPanel").style.display="none";
      document.getElementById("denied").style.display="none";
    }
  });
</script>

</body>
</html>
